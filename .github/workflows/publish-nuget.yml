name: Publish NuGet

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      package_version:
        description: NuGet package version, for example 0.1.0
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  PACKAGE_PROJECT: src/Vellum/Vellum.csproj
  TEST_PROJECT: src/Vellum.Tests/Vellum.Tests.csproj
  NUGET_OUTPUT: ${{ github.workspace }}/artifacts/nuget

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.package_version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/vellum.slnx

      - name: Build
        run: dotnet build src/vellum.slnx --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build

      - name: Pack
        run: dotnet pack ${{ env.PACKAGE_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.NUGET_OUTPUT }}" -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ${{ env.NUGET_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        run: dotnet nuget push "${{ env.NUGET_OUTPUT }}"/*.nupkg --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
