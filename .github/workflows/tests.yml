name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/vellum.slnx

      - name: Build
        run: dotnet build src/vellum.slnx --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test src/vellum.slnx --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=vellum-tests.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
          if-no-files-found: ignore

